services:
  db:
    image: postgres:16-alpine
    container_name: todo-postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: todo-spring-api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/todo_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=123
      - API_SECURITY_TOKEN_SECRET=uma-chave-secreta-e-longa-para-o-jwt-gerado-na-api

# ADICIONE ESTE BLOCO NO FINAL DO ARQUIVO:
volumes:
  postgres_data: